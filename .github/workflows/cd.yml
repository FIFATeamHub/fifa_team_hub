name: CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGION: us-central1
  AR_REPOSITORY: fifa-team-hub

  BACKEND_SERVICE: fifa-team-hub
  FRONTEND_SERVICE: fifa-team-hub-frontend

  BACKEND_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gcr.io/fifa-team-hub
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gcr.io/fifa-team-hub-frontend

  CLOUD_SQL_INSTANCE: ${{ secrets.GCP_PROJECT_ID }}:us-central1:fifa-db-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker Authentication
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Backend

      - name: Build Backend
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            ./backend

      - name: Push Backend
        run: docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      # Frontend

      - name: Build Frontend
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            ./frontend

      - name: Push Frontend
        run: docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # Deploy Backend

      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }}
            --update-secrets=DATABASE_URL=DATABASE_URL:latest,DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,SECRET_KEY=SECRET_KEY:latest,STORAGE_BACKEND=STORAGE_BACKEND:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,GCP_PROJECT_ID=GCP_PROJECT_ID:latest,DB_USER=DB_USER:latest,DB_NAME=DB_NAME:latest,CLOUD_SQL_INSTANCE_NAME=CLOUD_SQL_INSTANCE_NAME:latest

      # Deploy Frontend

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
