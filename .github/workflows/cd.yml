name: CD

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: fifa-team-hub

      BACKEND_IMAGE: gcr.io/fifa-team-hub/fifa-team-hub
      FRONTEND_IMAGE: gcr.io/fifa-team-hub/fifa-team-hub-frontend

      REGION: us-central1

      BACKEND_SERVICE: fifa-team-hub
      FRONTEND_SERVICE: fifa-team-hub-frontend

      SERVICE_ACCOUNT: fifa-team-hub-app@fifa-team-hub.iam.gserviceaccount.com

      CLOUD_SQL_INSTANCE: fifa-team-hub:us-central1:fifa-db-prod

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/655629807167/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: fifa-team-hub-app@fifa-team-hub.iam.gserviceaccount.com

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker gcr.io --quiet

      # Backend

      - name: Build Backend
        run: |
          docker build \
            -t $BACKEND_IMAGE:${{ github.sha }} \
            ./backend

      - name: Push Backend
        run: |
          docker push $BACKEND_IMAGE:${{ github.sha }}

      # Frontend

      - name: Build Frontend
        run: |
          docker build \
            -t $FRONTEND_IMAGE:${{ github.sha }} \
            ./frontend

      - name: Push Frontend
        run: |
          docker push $FRONTEND_IMAGE:${{ github.sha }}

      # Deploy Backend

      - name: Deploy Backend
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $BACKEND_IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --service-account=$SERVICE_ACCOUNT \
            --add-cloudsql-instances=$CLOUD_SQL_INSTANCE \
            --update-secrets=DATABASE_URL=DATABASE_URL:latest,DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,SECRET_KEY=SECRET_KEY:latest,STORAGE_BACKEND=STORAGE_BACKEND:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,GCP_PROJECT_ID=GCP_PROJECT_ID:latest,DB_USER=DB_USER:latest,DB_NAME=DB_NAME:latest,CLOUD_SQL_INSTANCE_NAME=CLOUD_SQL_INSTANCE_NAME:latest

      # Deploy Frontend

      - name: Deploy Frontend
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $FRONTEND_IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --service-account=$SERVICE_ACCOUNT