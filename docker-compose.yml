services:
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    ports:
      - "4443:4443"
    volumes:
      - ./fake-gcs-data:/data
    environment:
      PORT: 4443
      STORAGE_EMULATOR_HOST: http://fake-gcs:4443

  backend:
    build: ./backend
    environment:
      STORAGE_BACKEND: gcs
      GCS_BUCKET_NAME: fifa-team-hub-documents
      GCP_PROJECT_ID: test-project
      GOOGLE_CLOUD_PROJECT: test-project
      STORAGE_EMULATOR_HOST: http://fake-gcs:4443
    depends_on:
      - postgres
      - fake-gcs
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fifa_team_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: