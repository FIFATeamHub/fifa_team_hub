services:
  postgres:
    image: postgres:15-alpine

    container_name: fifa_team_hub_db

    restart: unless-stopped

    environment:

      POSTGRES_DB: fifa_team_hub
      POSTGRES_USER: fifa_user
      POSTGRES_PASSWORD: fifa_password

    ports:
      - "15432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    

  # --- SERVIÇO DO BACKEND ---
  backend:
    build: ./backend 
    container_name: fifa_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS}
    volumes:
      - ./backend:/app
      - ./backend/storage/uploads:/app/storage/uploads 
    depends_on:
      postgres:
        condition: service_healthy 
    



  # --- SERVIÇO DO FRONTEND ---
  frontend:
    build: ./frontend 
    container_name: fifa_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env



volumes:
  postgres_data: