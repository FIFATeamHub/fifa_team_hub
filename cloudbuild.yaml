substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE_NAME: fifa-team-hub
  _FRONTEND_SERVICE_NAME: fifa-team-hub-frontend
  _INSTANCE_CONNECTION_NAME: fifa-db-prod
  _BACKEND_URL: https://fifa-team-hub-655629807167.us-central1.run.app
  _FRONTEND_URL: https://fifa-team-hub-frontend-655629807167.us-central1.run.app
  _SERVICE_ACCOUNT: fifa-team-hub-app@$PROJECT_ID.iam.gserviceaccount.com

steps:
  # 1. Build Backend
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/fifa-team-hub:latest
      - ./backend

  # 2. Push Backend
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/fifa-team-hub:latest

  # 3. Deploy Backend
  - id: deploy-backend
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        INSTANCE_CONN_NAME=$(gcloud sql instances describe ${_INSTANCE_CONNECTION_NAME} --format="value(connectionName)")

        gcloud run deploy ${_BACKEND_SERVICE_NAME} \
          --image gcr.io/$PROJECT_ID/fifa-team-hub:latest \
          --platform managed \
          --region ${_REGION} \
          --memory 512Mi \
          --timeout 60 \
          --add-cloudsql-instances "$${INSTANCE_CONN_NAME}" \
          --set-env-vars STORAGE_BACKEND=gcs,GCS_BUCKET_NAME=fifa-team-hub-documents,GCP_PROJECT_ID=$PROJECT_ID,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,JWT_EXPIRE_MINUTES=30,FRONTEND_URL=${_FRONTEND_URL} \
          --set-secrets DATABASE_URL=DATABASE_URL:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,SECRET_KEY=SECRET_KEY:latest \
          --service-account ${_SERVICE_ACCOUNT} \
          --allow-unauthenticated \
          --min-instances 1 \
          --max-instances 10

  # 4. Build Frontend
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_API_URL=${_BACKEND_URL}
      - -t
      - gcr.io/$PROJECT_ID/fifa-team-hub-frontend:latest
      - ./frontend

  # 5. Push Frontend
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/fifa-team-hub-frontend:latest

  # 6. Deploy Frontend
  - id: deploy-frontend
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/fifa-team-hub-frontend:latest
      - --platform=managed
      - --region=${_REGION}
      - --memory=256Mi
      - --port=8080
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=5

images:
  - gcr.io/$PROJECT_ID/fifa-team-hub:latest
  - gcr.io/$PROJECT_ID/fifa-team-hub-frontend:latest

options:
  logging: CLOUD_LOGGING_ONLY
